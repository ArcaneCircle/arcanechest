<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="webxdc.js"></script>
    <style>
      :root {
        color-scheme: dark;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          sans-serif;
        background: #111113;
        color: #f2f2f2;
      }
      #app {
        display: flex;
        flex-direction: column;
        height: 100%;
        padding: 12px;
      }

      .chest-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 8px;
        flex-shrink: 0;
      }
      .chest-header .label {
        font-size: 13px;
        color: #777;
      }
      .chest-actions {
        display: flex;
        gap: 6px;
        align-items: center;
      }
      .btn.dirty {
        background: #520b8d;
        border-color: #520b8d;
        color: white;
      }
      .btn {
        padding: 6px 14px;
        font-size: 13px;
        background: transparent;
        border: 1px solid #444;
        border-radius: 10px;
        color: #ddd;
        cursor: pointer;
        font: inherit;
      }
      #app textarea {
        flex: 1;
        width: 100%;
        padding: 14px;
        font-size: 16px;
        line-height: 1.5;
        background: #1c1c1e;
        border: 1px solid #333;
        border-radius: 16px;
        color: white;
        resize: none;
        font-family:
          ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      }
      #app textarea:focus {
        outline: none;
        border-color: #efb215;
      }
      .hint {
        text-align: center;
        font-size: 11px;
        color: #555;
        margin-top: 4px;
        flex-shrink: 0;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module">
      async function encryptData(key, plaintextBytes) {
        const iv = crypto.getRandomValues(new Uint8Array(12));
        const encryptedBuffer = await crypto.subtle.encrypt(
          { name: "AES-GCM", iv: iv },
          key,
          plaintextBytes,
        );

        return {
          iv: btoa(String.fromCharCode(...iv)),
          data: btoa(String.fromCharCode(...new Uint8Array(encryptedBuffer))),
        };
      }

      async function handleSave(previewMode, newKey, newSalt) {
        let textIv = null;
        let textData = null;

        const text = document.getElementById("chest-textarea").value;
        if (text) {
          const encryptedText = await encryptData(
            newKey,
            new TextEncoder().encode(text),
          );
          textIv = encryptedText.iv;
          textData = encryptedText.data;
        }

        const gem = {
          salt: newSalt,
          textIv: textIv,
          textData: textData,
        };

        if (previewMode) {
          renderContent(text);
        } else {
          window.webxdc.sendToChat({
            file: { name: "gem.json", plainText: JSON.stringify(gem) },
          });
        }
      }

      function renderPage(newKey, newSalt) {
        const app = document.getElementById("app");

        const saveBtn = h(
          "button",
          {
            class: "btn",
            onclick: () => handleSave(false, newKey, newSalt),
          },
          "Save",
        );
        const previewBtn = h(
          "button",
          { class: "btn", onclick: () => handleSave(true, newKey, newSalt) },
          "Preview",
        );

        const header = h(
          "div",
          { class: "chest-header" },
          h("div", null, h("div", { class: "label" }, "New Gem")),
          h("div", { class: "chest-actions" }, previewBtn, saveBtn),
        );

        const textArea = h("textarea", {
          id: "chest-textarea",
          placeholder: "Enter content...",
        });

        app.append(header, textArea);

        textArea.focus();
        textArea.selectionStart = textArea.selectionEnd = textArea.value.length;

        textArea.addEventListener("input", () => {
          saveBtn.classList.add("dirty");
        });
      }

      // --- Initialization ---
      window.h = window.parent.h;
      window.renderContent = window.parent.renderContent;
      const newSalt = crypto.getRandomValues(new Uint8Array(16));
      const newKey = await window.parent.deriveEncryptionKey(
        window.parent.PASSPHRASE,
        newSalt,
      );
      renderPage(newKey, btoa(String.fromCharCode(...newSalt)));
    </script>
  </body>
</html>
