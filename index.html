<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      :root {
        color-scheme: dark;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          sans-serif;
        background: #111113;
        color: #f2f2f2;
      }
      #app {
        display: flex;
        flex-direction: column;
        height: 100%;
        padding: 12px;
      }
      #iframe-container {
        overflow: hidden;
        height: 100vh;
        width: 100vw;
        display: none;
      }
      #iframe-container iframe {
        border: 0;
        height: 100%;
        left: 0;
        position: absolute;
        top: 0;
        width: 100%;
      }

      .unlockScreen {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        flex: 1;
        gap: 8px;
        max-width: 320px;
        margin: 0 auto;
        width: 100%;
      }
      .unlockScreen h1 {
        font-size: 24px;
        margin: 0 0 12px;
        font-weight: 600;
      }
      .input {
        width: 100%;
        padding: 14px;
        font-size: 22px;
        text-align: center;
        background: #232326;
        border: 2px solid #555;
        border-radius: 14px;
        color: white;
        font: inherit;
      }
      .input::placeholder {
        color: #888;
      }
      .input:focus {
        outline: none;
        border-color: #efb215;
      }
      .btn {
        width: 100%;
        padding: 14px;
        font-size: 18px;
        font-weight: 500;
        background: #520b8d;
        color: white;
        border: none;
        border-radius: 14px;
        cursor: pointer;
        font: inherit;
        transition: opacity 0.15s;
      }
      .btn:active {
        background: #6613a0;
      }
      .btn:disabled {
        opacity: 0.5;
        cursor: default;
      }
      .hint {
        text-align: center;
        font-size: 11px;
        color: #555;
        margin-top: 4px;
        flex-shrink: 0;
      }
      .error {
        color: red;
          font-size: 1em;
          font-weight: bold;
      }

      /* Flare */

      .chestContainer {
        position: relative;
        width: 300px;
        height: 300px;
        margin: 0 auto;
        padding: 0 0.2em;
      }

      .chestFlare {
        position: absolute;
        inset: -1.2em;
        animation: chestFlareRotate 10s linear infinite;
        pointer-events: none;
        z-index: 0;
      }

      .chestFlareBeam {
        position: absolute;
        left: 50%;
        top: 50%;
        width: 90px;
        height: 180px;
        transform-origin: 50% 100%;
        transform: translate(-50%, -100%) rotate(var(--beam-rotation));
        clip-path: polygon(50% 100%, 100% 0, 0 0);
        background: linear-gradient(
          to top,
          rgba(255, 236, 130, 0.62) 0%,
          rgba(255, 224, 100, 0.3) 58%,
          rgba(255, 220, 100, 0) 100%
        );
        filter: blur(0.08em);
      }

      .chestImage {
        position: relative;
        z-index: 1;
        width: 300px;
        height: 300px;
      }

      @keyframes chestFlareRotate {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div id="iframe-container">
      <iframe id="frame"></iframe>
    </div>
    <div id="app"></div>
    <script type="module">
      async function decryptData(key, encryptedPayload) {
        try {
          const iv = Uint8Array.from(atob(encryptedPayload.iv), (c) =>
            c.charCodeAt(0),
          );
          const data = Uint8Array.from(atob(encryptedPayload.data), (c) =>
            c.charCodeAt(0),
          );
          return await crypto.subtle.decrypt(
            { name: "AES-GCM", iv: iv },
            key,
            data,
          );
        } catch (error) {
          console.error("Decryption failed:", error);
          return null;
        }
      }

      window.deriveEncryptionKey = async (password, salt) => {
        const encoder = new TextEncoder();
        const keyMaterial = await crypto.subtle.importKey(
          "raw",
          encoder.encode(password.trim()),
          { name: "PBKDF2" },
          false,
          ["deriveBits", "deriveKey"],
        );

        return crypto.subtle.deriveKey(
          { name: "PBKDF2", salt: salt, iterations: 2e6, hash: "SHA-256" },
          keyMaterial,
          { name: "AES-GCM", length: 256 },
          false,
          ["encrypt", "decrypt"],
        );
      };

      window.h = (tag, attributes = {}, ...children) => {
        const element = document.createElement(tag);

        for (const [key, value] of Object.entries(attributes || {})) {
          if (key === "class") {
            element.className = value;
          } else if (key.startsWith("on")) {
            element.addEventListener(key.slice(2), value);
          } else {
            element.setAttribute(key, value);
          }
        }

        for (const child of children) {
          if (typeof child === "string" || child instanceof Node) {
            element.append(child);
          }
        }

        return element;
      };

      window.renderContent = (content) => {
        document.getElementById("frame").srcdoc = content;
        document.getElementById("iframe-container").style.display = "block";
        document.getElementById("app").innerHTML = "";
      };

      function renderPage(gem) {
        const app = document.getElementById("app");
        const currentPassphrase = localStorage.currentPassphrase || "";
        if (currentPassphrase) app.style.display = "none";

        const passphraseInput = h("input", {
          id: "passphrase-input",
          class: "input",
          type: "text",
          value: currentPassphrase,
          placeholder: "KEY CODE",
        });

        passphraseInput.addEventListener("keydown", (e) => {
          if (e.key === "Enter") handleUnlock();
        });

        const unlockBtn = h(
          "button",
          { id: "unlock-btn", class: "btn", onclick: handleUnlock },
          "Unlock",
        );

        const statusText = h("div", {
          id: "unlock-status",
          class: "hint",
        });

        const chestFlare = h("div", { class: "chestFlare" });
        const CHEST_BEAM_COUNT = 7;
        for (let i = 0; i < CHEST_BEAM_COUNT; i++) {
          chestFlare.append(
            h("span", {
              class: "chestFlareBeam",
              style: `--beam-rotation: ${(360 / CHEST_BEAM_COUNT) * i}deg`,
            }),
          );
        }

        const unlockScreen = h(
          "div",
          { class: "unlockScreen" },
          h(
            "div",
            { class: "chestContainer" },
            chestFlare,
            h("img", {
              class: "chestImage",
              src: "/chest.webp",
            }),
          ),
          h("h1", null, "Arcane Chest #%VITE_CHEST_NUMBER%"),
          passphraseInput,
          unlockBtn,
          statusText,
        );

        app.append(unlockScreen);
        passphraseInput.focus();

        if (currentPassphrase) handleUnlock();
      }

      async function handleUnlock() {
        const passphraseInput = document.getElementById("passphrase-input");
        const unlockBtn = document.getElementById("unlock-btn");
        const statusText = document.getElementById("unlock-status");

        const passphrase = passphraseInput.value.trim();
        if (!passphrase) return;

        passphraseInput.disabled = true;
        unlockBtn.disabled = true;
        unlockBtn.textContent = "Unlocking…";
        statusText.classList.remove("error");
        statusText.textContent = "Using key, please wait…";

        // Yield to UI thread to allow the UI to update before heavy crypto operations
        await new Promise((resolve) => setTimeout(resolve, 50));

        if (!gem) {
          window.PASSPHRASE = passphrase;
          renderContent(await (await fetch("/create.html")).text());
          return;
        }

        const saltBytes = Uint8Array.from(atob(gem.salt), (c) =>
          c.charCodeAt(0),
        );
        const oldKey = await deriveEncryptionKey(passphrase, saltBytes);
        const decryptedBytes = await decryptData(oldKey, {
          iv: gem.textIv,
          data: gem.textData,
        });

        if (decryptedBytes) {
          renderContent(new TextDecoder().decode(decryptedBytes));
          localStorage.currentPassphrase = passphrase;
          return;
        }

        passphraseInput.disabled = false;
        passphraseInput.value = "";
        unlockBtn.disabled = false;
        unlockBtn.textContent = "Unlock";
        statusText.classList.add("error");
        statusText.textContent = "INVALID KEY!";
      }

      // --- Initialization ---
      let gem = null;
      try {
        gem = await (await fetch(`/gem.json`)).json();
      } catch (e) {}
      renderPage(gem);
    </script>
  </body>
</html>
